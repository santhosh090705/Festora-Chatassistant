<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events – Festora</title>
    <meta name="description" content="Browse all concerts, festivals and events. Filter by genre, city, and date.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>

<body>

    <div class="page-loader" id="page-loader">
        <div class="loader-logo">🎵 Festora</div>
        <div class="loader-spinner"></div>
    </div>

    <nav class="navbar" id="main-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="36" height="36" rx="9" fill="#0D0D16" />
                    <rect width="36" height="36" rx="9" fill="url(#fbgev)" opacity="0.15" />
                    <path d="M10 9h14v4H14v4h9v4h-9v10h-4V9z" fill="url(#fgradev)" />
                    <defs>
                        <linearGradient id="fbgev" x1="0" y1="0" x2="36" y2="36">
                            <stop stop-color="#9B5DE5" />
                            <stop offset="1" stop-color="#6D28D9" />
                        </linearGradient>
                        <linearGradient id="fgradev" x1="10" y1="9" x2="24" y2="31">
                            <stop stop-color="#C084FC" />
                            <stop offset="1" stop-color="#7C3AED" />
                        </linearGradient>
                    </defs>
                </svg>
                <span>Festora</span>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="events.html" class="active">Events</a>
                <a href="events.html?genre=rock">Artists</a>
                <a href="index.html#why">About</a>
            </div>
            <div id="nav-actions" class="nav-actions"></div>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
        <div id="mobile-menu" class="hidden"
            style="background:var(--bg-card);border-top:1px solid var(--border-light);padding:16px 24px;display:flex;flex-direction:column;gap:16px;">
            <a href="index.html" style="color:var(--text-secondary)">Home</a>
            <a href="events.html" style="color:var(--text-secondary)">Events</a>
            <a href="login.html" style="color:var(--text-secondary)">Login</a>
        </div>
    </nav>

    <div class="events-page">
        <div class="container">
            <!-- Page Header -->
            <div style="padding:40px 0 32px">
                <div class="section-label">Discover Live Music</div>
                <h1 class="section-title">Browse <span>All Events</span></h1>
            </div>

            <!-- Filter Bar -->
            <div class="events-filter">
                <span class="filter-label">Search:</span>
                <div class="search-bar" style="max-width:340px">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="color:var(--text-muted)">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.35-4.35" />
                    </svg>
                    <input type="text" id="search-input" placeholder="Artist, event, venue..." oninput="applyFilters()">
                </div>
                <span class="filter-label">City:</span>
                <select id="city-filter" class="form-control"
                    style="width:auto;padding:10px 16px;border-radius:var(--radius-full)" onchange="applyFilters()">
                    <option value="">All Cities</option>
                    <option>Mumbai</option>
                    <option>Navi Mumbai</option>
                    <option>Pune</option>
                    <option>Bengaluru</option>
                    <option>Delhi</option>
                    <option>Chennai</option>
                    <option>Hyderabad</option>
                    <option>Jaipur</option>
                    <option>Goa</option>
                    <option>Khetri</option>
                    <option>Ziro</option>
                </select>
                <span class="filter-label">Sort:</span>
                <select id="sort-filter" class="form-control"
                    style="width:auto;padding:10px 16px;border-radius:var(--radius-full)" onchange="applyFilters()">
                    <option value="date">Date</option>
                    <option value="price-asc">Price: Low to High</option>
                    <option value="price-desc">Price: High to Low</option>
                    <option value="rating">Rating</option>
                </select>
            </div>

            <!-- Genre Tabs -->
            <div class="category-tabs" id="genre-tabs"></div>

            <!-- Results Count -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
                <span style="color:var(--text-muted);font-size:0.85rem" id="results-label">Showing all events</span>
                <div style="display:flex;gap:8px">
                    <button id="view-grid" class="btn btn-ghost btn-sm" onclick="setView('grid')"
                        title="Grid view">⊞</button>
                    <button id="view-list" class="btn btn-ghost btn-sm" onclick="setView('list')"
                        title="List view">☰</button>
                </div>
            </div>

            <!-- Events Grid -->
            <div id="events-container" class="events-grid"></div>

            <!-- Empty State -->
            <div id="empty-state" class="hidden" style="text-align:center;padding:80px 0">
                <div style="font-size:4rem;margin-bottom:16px">🎵</div>
                <h3 style="margin-bottom:8px">No events found</h3>
                <p style="color:var(--text-muted)">Try adjusting your filters or search query.</p>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <span class="footer-copy">© 2026 Festora Inc. All rights reserved.</span>
                <span class="footer-copy">✉ support@festora.com</span>
            </div>
        </div>
    </footer>

    <style>
        .event-list-card {
            display: flex;
            gap: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: 20px;
            cursor: pointer;
            transition: var(--transition);
            align-items: center;
        }

        .event-list-card:hover {
            border-color: var(--border);
            transform: translateX(4px);
            box-shadow: var(--shadow-purple);
        }

        .event-list-img {
            width: 100px;
            height: 100px;
            border-radius: var(--radius-md);
            object-fit: cover;
            flex-shrink: 0;
        }

        .event-list-body {
            flex: 1;
        }

        .event-list-title {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .event-list-meta {
            color: var(--text-muted);
            font-size: 0.82rem;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }

        .event-list-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        let currentGenre = 'all';
        let currentView = 'grid';

        document.addEventListener('DOMContentLoaded', async () => {
            await Auth.checkAuthSync();
            // Genre tabs
            const tabsEl = document.getElementById('genre-tabs');
            tabsEl.innerHTML = GENRES.map(g => `<button class="tab-btn" onclick="setGenre('${g.id}',this)">${g.icon} ${g.label}</button>`).join('');

            // Read URL params
            const params = new URLSearchParams(window.location.search);
            const genre = params.get('genre');
            const q = params.get('q');

            if (genre) {
                currentGenre = genre;
                const btn = [...tabsEl.querySelectorAll('.tab-btn')].find(b => b.textContent.includes(GENRES.find(g => g.id === genre)?.label || ''));
                if (btn) { tabsEl.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
            } else {
                tabsEl.querySelector('.tab-btn').classList.add('active');
            }

            if (q) document.getElementById('search-input').value = q;

            applyFilters();
        });

        function setGenre(genre, btn) {
            currentGenre = genre;
            document.querySelectorAll('#genre-tabs .tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function setView(v) {
            currentView = v;
            document.getElementById('view-grid').style.background = v === 'grid' ? 'var(--primary)' : '';
            document.getElementById('view-list').style.background = v === 'list' ? 'var(--primary)' : '';
            applyFilters();
        }

        function applyFilters() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const city = document.getElementById('city-filter').value;
            const sort = document.getElementById('sort-filter').value;

            let filtered = EVENTS.filter(e => {
                const matchGenre = currentGenre === 'all' || e.genre === currentGenre;
                const matchCity = !city || e.city === city;
                const matchQ = !q || e.title.toLowerCase().includes(q) || e.artist.toLowerCase().includes(q) ||
                    e.venue.toLowerCase().includes(q) || (e.tags || []).some(t => t.includes(q));
                return matchGenre && matchCity && matchQ;
            });

            // Sort
            if (sort === 'price-asc') filtered.sort((a, b) => a.price - b.price);
            else if (sort === 'price-desc') filtered.sort((a, b) => b.price - a.price);
            else if (sort === 'rating') filtered.sort((a, b) => b.rating - a.rating);
            else filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

            renderEvents(filtered);
        }

        function renderEvents(events) {
            const container = document.getElementById('events-container');
            const empty = document.getElementById('empty-state');
            document.getElementById('results-label').textContent = `Showing ${events.length} event${events.length !== 1 ? 's' :
                ''}`;

            if (!events.length) { container.innerHTML = ''; empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');

            if (currentView === 'grid') {
                container.className = 'events-grid';
                container.innerHTML = events.map(e => `
    <div class="card event-card" onclick="window.location='event-detail.html?id=${e.id}'">
        <div class="event-card-img-wrap">
            <img class="event-card-img" src="${e.thumb}" alt="${e.title}" loading="lazy">
            <div class="event-card-badge">
                <span class="badge ${genreClass(e.genre)}">${genreLabel(e.genre)}</span>
                ${e.badge ? `<span class="badge badge-${e.badge}"
                    style="margin-left:4px">${e.badge.toUpperCase()}</span>` : ''}
            </div>
            <button class="event-card-fav ${Auth.isFavorite(e.id) ? 'active' : ''}"
                onclick="favToggle(event,${e.id},this)">♥</button>
        </div>
        <div class="event-card-body">
            <div class="event-card-title">${e.title}</div>
            <div class="event-card-meta">
                <span>📅 ${formatDate(e.date)}</span>
                <span>ðŸ“ ${e.city}</span>
            </div>
            <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:10px">â­ ${e.rating} (${e.reviews}
                reviews)</div>
            <div class="event-card-footer">
                <span class="event-price">from ${formatPrice(e.price)}</span>
                <button class="event-card-btn"
                    onclick="event.stopPropagation();window.location='event-detail.html?id=${e.id}'">Book Now</button>
            </div>
        </div>
    </div>`).join('');
            } else {
                container.className = '';
                container.style.display = 'flex';
                container.style.flexDirection = 'column';
                container.style.gap = '16px';
                container.innerHTML = events.map(e => `
    <div class="event-list-card" onclick="window.location='event-detail.html?id=${e.id}'">
        <img class="event-list-img" src="${e.thumb}" alt="${e.title}" loading="lazy">
        <div class="event-list-body">
            <div class="event-list-title">${e.title}</div>
            <div class="event-list-meta">
                <span>📅 ${formatDate(e.date)} · ${e.time}</span>
                <span>ðŸ“ ${e.venue}</span>
                <span>â­ ${e.rating}</span>
            </div>
            <div style="display:flex;gap:8px">
                <span class="badge ${genreClass(e.genre)}">${genreLabel(e.genre)}</span>
                ${(e.tags || []).slice(0, 2).map(t => `<span class="badge badge-primary">${t}</span>`).join('')}
            </div>
        </div>
        <div class="event-list-actions">
            <div>
                <div class="event-price" style="font-size:1.2rem">${formatPrice(e.price)}</div>
                <div style="font-size:0.72rem;color:var(--text-muted)">${e.available} left</div>
            </div>
            <button class="btn btn-primary btn-sm"
                onclick="event.stopPropagation();window.location='event-detail.html?id=${e.id}'">Book</button>
        </div>
    </div>`).join('');
            }
        }

        function favToggle(e, id, btn) {
            e.stopPropagation();
            if (!Auth.isLoggedIn()) { window.location.href = 'login.html'; return; }
            const added = Auth.toggleFavorite(id);
            btn.classList.toggle('active', added);
            Toast.show(added ? 'Added to favorites ♥' : 'Removed from favorites', added ? 'success' : 'info');
        }
    </script>
</body>

</html>
